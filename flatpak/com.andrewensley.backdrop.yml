app-id: com.andrewensley.backdrop
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: backdrop

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/backdrop/cargo-home

finish-args:
  - --share=network # fetch wallpaper images from the internet
  - --filesystem=home # wallpaper file paths must be readable by the compositor on the host

  # GNOME: gsettings is in the runtime and works inside the sandbox via dconf D-Bus
  - --talk-name=ca.desrt.dconf
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf

  # KDE: qdbus is not in the GNOME runtime. To support KDE, the wallpaper/kde.rs
  # code needs to wrap commands with `flatpak-spawn --host`, which requires:
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.kde.plasmashell

modules:
  - name: backdrop
    buildsystem: simple
    build-commands:
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/backdrop /app/bin/backdrop
      - install -Dm644 flatpak/com.andrewensley.backdrop.desktop
        /app/share/applications/com.andrewensley.backdrop.desktop
      - install -Dm644 frontend/icon.svg
        /app/share/icons/hicolor/scalable/apps/com.andrewensley.backdrop.svg
      - install -Dm644 src-tauri/icons/icon.png
        /app/share/icons/hicolor/512x512/apps/com.andrewensley.backdrop.png
    sources:
      - type: dir
        path: ..
      # Generated by flatpak-cargo-generator.py in CI; not committed to the repo.
      - generated-cargo-sources.json
