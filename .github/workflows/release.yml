name: release

on: # Triggered by completed runs of the test workflow on the main branch
  workflow_run:
    workflows:
      - 'test'
    branches:
      - main
    types:
      - completed

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' # only on success
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GHA_SEMANTIC_RELEASE_TOKEN }}
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false # never use caching in release builds
      - name: Install dependencies
        # Don't run post-install scripts which set the pre-commit hooks
        run: npm ci --ignore-scripts
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
