name: test

on:
  push:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: Lint
        run: npm run lint

      - name: Install ShellCheck v0.11.0
        run: |
          curl -sSL "https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz" | tar -xJ
          sudo mv shellcheck-v0.11.0/shellcheck /usr/local/bin/shellcheck

      - name: Test
        run: npm test

  test-ps:
    name: test (powershell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install PSScriptAnalyzer and Pester
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -ErrorAction Stop
          Install-Module -Name Pester            -Scope CurrentUser -Force -MinimumVersion 5.0 -ErrorAction Stop

      - name: Lint
        shell: pwsh
        run: |
          $results = 'src/backdrop.psm1', 'src/install.ps1' | ForEach-Object { Invoke-ScriptAnalyzer -Path $_ -Severity @('Error', 'Warning') }
          if ($results) {
            $results | Format-Table RuleName, Severity, Line, Message -AutoSize
            exit 1
          }

      - name: Test
        shell: pwsh
        run: |
          $result = Invoke-Pester test/backdrop.tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }
