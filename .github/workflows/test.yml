name: test

on:
  push:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: Lint
        run: npm run lint

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './src'

      - name: Test
        run: npm test
